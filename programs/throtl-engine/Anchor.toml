[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
throtl_engine = "YSaqfuc753DkHZoaEvdNMSTQTf4hEuTtP65hszuvJy9"

[programs.devnet]
throtl_engine = "YSaqfuc753DkHZoaEvdNMSTQTf4hEuTtP65hszuvJy9"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
