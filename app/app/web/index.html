<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Throtl — the first analog exchange. Race the SOL-perp chart; the trade is real (Flash Trade on a MagicBlock Ephemeral Rollup).">

  <!-- iOS / theme -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Throtl">
  <meta name="theme-color" content="#0D163A">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon: the Throtl wing mark -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>Throtl — race the chart</title>
  <link rel="manifest" href="manifest.json">

  <!-- Browser-wallet bridge + Rive (loading splash). All self-hosted (same-origin). -->
  <script src="solana-web3.iife.min.js"></script>
  <script src="wallet.js"></script>
  <script src="rive.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b1130; }
    /* Pre-Flutter loading splash — paints instantly from CSS, the Rive car pops in
       once its runtime loads, and the whole thing fades on Flutter's first frame. */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px;
      background: radial-gradient(120% 90% at 50% 30%, #16224f 0%, #0b1130 60%, #070b22 100%);
      transition: opacity .5s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #riveCar { width: min(78vw, 560px); height: min(48vh, 360px); }
    .splash-mark { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .splash-mark svg { width: 46px; height: 46px; }
    .splash-mark span {
      color: #fff; font-weight: 800; letter-spacing: 3px; font-size: 26px;
    }
    .splash-sub { color: #9fb0e6; font-size: 13px; letter-spacing: 2px; font-weight: 700; }
    .splash-bar {
      width: min(60vw, 260px); height: 6px; border-radius: 6px;
      background: rgba(255,255,255,.12); overflow: hidden; margin-top: 2px;
    }
    .splash-bar > i {
      display: block; height: 100%; width: 38%; border-radius: 6px;
      background: linear-gradient(90deg, #ffb03a, #ffc83d);
      animation: slide 1.15s ease-in-out infinite;
    }
    @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(360%); } }
  </style>
</head>
<body>
  <div id="splash">
    <canvas id="riveCar"></canvas>
    <div class="splash-mark">
      <svg viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 30C56 62 88 68 120 68C152 68 184 62 228 30C198 60 164 72 140 92C129 101 124 108 120 120C116 108 111 101 100 92C76 72 42 60 12 30Z" fill="#FFC83D"/>
      </svg>
      <span>THROTL</span>
    </div>
    <div class="splash-sub">WARMING THE ENGINE…</div>
    <div class="splash-bar"><i></i></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Rive car in the splash (self-hosted runtime + wasm).
    (function () {
      if (!window.rive) return;
      try {
        rive.RuntimeLoader.setWasmUrl('rive.wasm');
        var r = new rive.Rive({
          src: 'loading-car.riv',
          canvas: document.getElementById('riveCar'),
          autoplay: true,
          onLoad: function () { try { r.resizeDrawingSurfaceToCanvas(); } catch (e) {} },
        });
        window.__throtlRive = r;
      } catch (e) { /* splash still shows the logo + bar */ }
    })();

    function __hideSplash() {
      var s = document.getElementById('splash');
      if (!s) return;
      s.style.opacity = '0';
      setTimeout(function () {
        if (s && s.parentNode) s.parentNode.removeChild(s);
        if (window.__throtlRive) { try { window.__throtlRive.cleanup(); } catch (e) {} }
      }, 520);
    }
    // Flutter dispatches this when its first frame is painted.
    window.addEventListener('flutter-first-frame', __hideSplash);
    // Safety: never let the splash get stuck if the event is missed.
    setTimeout(__hideSplash, 25000);
  </script>
</body>
</html>
